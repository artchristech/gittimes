name: Daily Edition

on:
  schedule:
    - cron: '0 7 * * *' # Midnight MST (7 AM UTC) / 1 AM MDT
  workflow_dispatch: # Manual trigger

env:
  TZ: America/Denver

concurrency:
  group: daily-edition
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Checkout gh-pages into site/
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true # First run won't have gh-pages yet

      - name: Generate and publish edition
        run: node publish-edition.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PUBLISH_DIR: ./site
          SITE_BASE_URL: https://gittimes.com
          BASE_PATH: ""
          CHAT_WORKER_URL: ${{ secrets.CHAT_WORKER_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
          PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true

      - name: Alert on failure
        if: failure()
        run: |
          gh issue create \
            --title "Daily edition failed: $(date +%Y-%m-%d)" \
            --body "The daily edition pipeline failed on $(date '+%Y-%m-%d %H:%M %Z').

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the logs for details." \
            --label "pipeline-failure"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Sync AI Models

on:
  schedule:
    - cron: '0 5 * * *' # 2 hours before daily edition (5 AM UTC / 10 PM MST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync model data from OpenRouter
        run: node src/sync-models.js

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai-models.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync AI model pricing data"
            git push
          fi

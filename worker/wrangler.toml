name = "gittimes-chat"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://gittimes.com"

# Secrets (set via `wrangler secret put`):
# - STRIPE_SECRET_KEY
# - XAI_API_KEY
# - STRIPE_PRICE_ID
# - RESEND_API_KEY
# - NEWSLETTER_SECRET

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# Run: cd worker && wrangler kv namespace create SUBSCRIBERS
# Then paste the returned ID above

[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_USERS_KV_ID"
# Run: cd worker && wrangler kv namespace create USERS

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_SESSIONS_KV_ID"
# Run: cd worker && wrangler kv namespace create SESSIONS

[[kv_namespaces]]
binding = "MAGIC_LINKS"
id = "REPLACE_WITH_MAGIC_LINKS_KV_ID"
# Run: cd worker && wrangler kv namespace create MAGIC_LINKS

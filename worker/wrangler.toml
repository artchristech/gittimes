name = "gittimes-chat"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://gittimes.com"
CHAT_MONTHLY_LIMIT = "100"
STRIPE_PRICE_AMOUNT = "500"
# OpenRouter model for premium chat. Free by default; before charging for premium,
# switch to a paid model (free tier rate-limits make a poor paid experience).
CHAT_MODEL = "nvidia/nemotron-3-super-120b-a12b:free"

# Secrets (set via `wrangler secret put`):
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - OPENROUTER_API_KEY
# - STRIPE_PRICE_ID
# - RESEND_API_KEY
# - NEWSLETTER_SECRET
# - ADMIN_TOKEN

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# Run: cd worker && wrangler kv namespace create SUBSCRIBERS
# Then paste the returned ID above

[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_USERS_KV_ID"
# Run: cd worker && wrangler kv namespace create USERS

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_SESSIONS_KV_ID"
# Run: cd worker && wrangler kv namespace create SESSIONS

[[kv_namespaces]]
binding = "MAGIC_LINKS"
id = "REPLACE_WITH_MAGIC_LINKS_KV_ID"
# Run: cd worker && wrangler kv namespace create MAGIC_LINKS

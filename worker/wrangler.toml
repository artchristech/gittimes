name = "gittimes-chat"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://gittimes.com"
CHAT_MONTHLY_LIMIT = "100"
STRIPE_PRICE_AMOUNT = "500"
# OpenRouter model for premium chat. Paid model for go-live (free tier rate-limits
# make a poor paid experience). Cheap + fast; change here + redeploy to swap.
CHAT_MODEL = "openai/gpt-4o-mini"

# Secrets (set via `wrangler secret put`):
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - OPENROUTER_API_KEY
# - STRIPE_PRICE_ID
# - RESEND_API_KEY
# - NEWSLETTER_SECRET
# - ADMIN_TOKEN

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "a775f4610f1a484e96b5e8312d359900"
# Run: cd worker && wrangler kv namespace create SUBSCRIBERS
# Then paste the returned ID above

[[kv_namespaces]]
binding = "USERS"
id = "8c879ccdb87d42ab8758f3131e94af70"
# Run: cd worker && wrangler kv namespace create USERS

[[kv_namespaces]]
binding = "SESSIONS"
id = "c3bdb4f2084e40dbaba69eb8bf35c2ae"
# Run: cd worker && wrangler kv namespace create SESSIONS

[[kv_namespaces]]
binding = "MAGIC_LINKS"
id = "04e8c0613fa3487fb599a127a856b63e"
# Run: cd worker && wrangler kv namespace create MAGIC_LINKS

name = "gittimes-chat"
main = "index.js"
compatibility_date = "2024-01-01"

# Hourly reconciliation sweep — downgrades users whose dunning grace has lapsed
# but who never returned to trigger the lazy resolveGracePeriod() path.
[triggers]
crons = ["0 * * * *"]

[vars]
ALLOWED_ORIGIN = "https://gittimes.com"
SITE_BASE_URL = "https://gittimes.com"
# Premium monthly cap. At gpt-4o-mini rates (~$0.001–0.003/turn) even a heavy
# premium user costs cents/mo against $5 revenue, so this is "effectively
# unlimited" with an abuse ceiling rather than a real product limit.
CHAT_MONTHLY_LIMIT = "1000"
# AI Desk daily allowance for FREE registered accounts. 0 = Premium-only: free
# plans get NO model usage at all (no spend, no abuse surface). Set to a positive
# number to re-enable a daily "taste" as a conversion funnel.
FREE_DAILY_CHAT_LIMIT = "0"
STRIPE_PRICE_AMOUNT = "500"
# OpenRouter model for premium chat. Paid model for go-live (free tier rate-limits
# make a poor paid experience). Cheap + fast; change here + redeploy to swap.
CHAT_MODEL = "openai/gpt-4o-mini"
# Owner-alert address for free->premium conversions (sent via Resend, out-of-band
# to the owner — not a Stripe customer). Unset => conversion alert is OFF.
ALERT_EMAIL = "mandalazenwave@gmail.com"
# Clerk (hybrid exchange). Leave CLERK_ISSUER/CLERK_JWKS_URL empty until the
# Clerk instance exists — /auth/clerk-exchange 404s while unset, so deploys are
# inert. Production values: issuer https://clerk.gittimes.com and its
# /.well-known/jwks.json; dev instance uses https://<slug>.clerk.accounts.dev.
# CLERK_AUTHORIZED_PARTIES (optional, comma-separated) defaults to ALLOWED_ORIGIN.
CLERK_ISSUER = "https://humble-hermit-34.clerk.accounts.dev"
CLERK_JWKS_URL = "https://humble-hermit-34.clerk.accounts.dev/.well-known/jwks.json"
# Legacy magic-link sign-in. Kept ON as a fallback for one release after Clerk
# lands; flip to "false" to retire, then delete the route + Resend template.
MAGIC_LINK_ENABLED = "true"

# Secrets (set via `wrangler secret put`):
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - OPENROUTER_API_KEY
# - STRIPE_PRICE_ID
# - STRIPE_PRICE_ID_ANNUAL  (optional — annual SKU; /checkout?interval=annual falls back to monthly if unset)
# - RESEND_API_KEY
# - NEWSLETTER_SECRET
# - ADMIN_TOKEN
# - CLERK_SECRET_KEY  (optional — only used to delete the Clerk user on account deletion)

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "a775f4610f1a484e96b5e8312d359900"
# Run: cd worker && wrangler kv namespace create SUBSCRIBERS
# Then paste the returned ID above

[[kv_namespaces]]
binding = "USERS"
id = "8c879ccdb87d42ab8758f3131e94af70"
# Run: cd worker && wrangler kv namespace create USERS

[[kv_namespaces]]

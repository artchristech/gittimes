<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https:; script-src 'unsafe-inline'{{CSP_SCRIPT_SRC}}; connect-src 'self'{{CSP_CONNECT_SRC}}">
  <title>{{ARTICLE_HEADLINE}} — The Git Times</title>
  {{ANALYTICS_SCRIPT}}
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:site_name" content="The Git Times">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <meta name="description" content="{{OG_DESCRIPTION}}">
  <link rel="canonical" href="{{OG_URL}}">
  <link rel="alternate" type="application/rss+xml" title="The Git Times" href="{{FEED_URL}}">

  <style>
{{STYLES}}

.article-page-back {
  display: inline-block;
  font-family: var(--font-meta);
  font-size: 13px;
  color: var(--ink-light);
  text-decoration: none;
  margin-bottom: 16px;
}
.article-page-back:hover {
  color: var(--accent);
}
.article-page-section-badge {
  display: inline-block;
  font-family: var(--font-meta);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 8px;
}
.article-page-cta {
  display: block;
  text-align: center;
  margin: 48px auto 24px;
  padding: 14px 32px;
  font-family: var(--font-meta);
  font-size: 14px;
  font-weight: 600;
  color: var(--paper);
  background: var(--ink);
  border: none;
  text-decoration: none;
  letter-spacing: 0.03em;
}
.article-page-cta:hover {
  background: var(--accent);
}
.article-page-share {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--rule-light);
  font-family: var(--font-meta);
  font-size: 13px;
  color: var(--ink-faint);
}
.article-page-share a {
  color: var(--ink-light);
  text-decoration: none;
  font-weight: 500;
}
.article-page-share a:hover {
  color: var(--accent);
}
  </style>
</head>
<body>

  <header class="masthead">
    <span class="masthead-date">{{EDITION_DATE}}</span>
    <h1 class="masthead-title"><a href="{{BASE_PATH}}/editions/{{DATE_STR}}/" style="color:inherit;text-decoration:none">The Git Times</a></h1>
  </header>

  <main style="max-width:720px;margin:0 auto">
    <a class="article-page-back" href="{{BASE_PATH}}/editions/{{DATE_STR}}/">&larr; Full Edition</a>
    <span class="article-page-section-badge">{{SECTION_LABEL}}</span>

    {{ARTICLE_CONTENT}}

    <div class="article-page-share">
      <span>Share:</span>
      <a href="https://twitter.com/intent/tweet?text={{SHARE_TEXT}}&url={{SHARE_URL}}" target="_blank" rel="noopener">X</a>
      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{SHARE_URL}}" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://news.ycombinator.com/submitlink?u={{SHARE_URL}}&t={{SHARE_TEXT}}" target="_blank" rel="noopener">HN</a>
    </div>

    <a class="article-page-cta" href="{{BASE_PATH}}/editions/{{DATE_STR}}/">Read Today's Full Edition</a>
  </main>

  <footer class="footer">
    <p>The Git Times aims to provide information that inspires people to build.</p>
  </footer>

  <script>
    (function () {
      var root = document.documentElement;
      var defaults = {
        theme: 'light', font: 'serif', size: 'medium', width: 'normal',
        bgH: '40', bgS: '18', bgL: '97',
        txH: '0', txS: '0', txL: '10'
      };
      var presets = {
        light:    { bgH: 40,  bgS: 18, bgL: 97, txH: 0,   txS: 0,  txL: 10 },
        dark:     { bgH: 240, bgS: 8,  bgL: 11, txH: 30,  txS: 6,  txL: 87 },
        sepia:    { bgH: 40,  bgS: 42, bgL: 90, txH: 28,  txS: 28, txL: 20 },
        midnight: { bgH: 215, bgS: 30, bgL: 7,  txH: 210, txS: 10, txL: 82 }
      };
      var state = {};
      Object.keys(defaults).forEach(function (key) {
        state[key] = localStorage.getItem('gittimes-' + key) || defaults[key];
      });
      function hsl(h, s, l) { return 'hsl(' + h + ',' + s + '%,' + l + '%)'; }
      function deriveColors(h, s, l) {
        var bgLight = parseInt(l);
        var isDark = bgLight < 50;
        return isDark ? {
          inkLight: hsl(h, Math.max(s - 10, 0), Math.min(parseInt(l) + 30, 80)),
          inkFaint: hsl(h, Math.max(s - 15, 0), Math.min(parseInt(l) + 18, 60)),
          rule: hsl(h, Math.max(s - 10, 0), Math.min(parseInt(l) + 60, 90)),
          ruleLight: hsl(h, Math.max(s - 12, 0), Math.min(parseInt(l) + 12, 35))
        } : {
          inkLight: hsl(h, Math.max(s - 5, 0), Math.max(parseInt(l) - 55, 20)),
          inkFaint: hsl(h, Math.max(s - 8, 0), Math.max(parseInt(l) - 40, 40)),
          rule: hsl(h, Math.max(s - 5, 0), Math.max(parseInt(l) - 70, 10)),
          ruleLight: hsl(h, Math.max(s - 10, 0), Math.max(parseInt(l) - 12, 70))
        };
      }
      function apply() {
        Object.keys(state).forEach(function (key) {
          root.setAttribute('data-' + key, state[key]);
        });
        var bgH = state.bgH, bgS = state.bgS, bgL = state.bgL;
        var txH = state.txH, txS = state.txS, txL = state.txL;
        var d = deriveColors(bgH, bgS, bgL);
        root.style.setProperty('--paper', hsl(bgH, bgS, bgL));
        root.style.setProperty('--ink', hsl(txH, txS, txL));
        root.style.setProperty('--ink-light', d.inkLight);
        root.style.setProperty('--ink-faint', d.inkFaint);
        root.style.setProperty('--rule', d.rule);
        root.style.setProperty('--rule-light', d.ruleLight);
        var accentH = (parseInt(bgH) + 180) % 360;
        root.style.setProperty('--accent', hsl(accentH, 65, parseInt(bgL) < 50 ? 60 : 35));
      }
      apply();
      // Hybrid article expand/collapse
      document.addEventListener('click', function(e) {
        var toggle = e.target.closest('.hybrid-toggle');
        if (!toggle) return;
        var article = toggle.closest('.hybrid-article');
        if (!article) return;
        var expanded = article.classList.toggle('expanded');
        toggle.textContent = expanded ? 'Read less' : 'Read more';
        toggle.setAttribute('aria-expanded', expanded);
      });
    })();
  </script>

</body>
</html>

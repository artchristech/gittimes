<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https:; script-src 'unsafe-inline'">
  <title>The Git Times — Archive</title>

  <style>
{{STYLES}}
  </style>
</head>
<body>

  <header class="masthead">
    <h1 class="masthead-title"><a href="{{BASE_PATH}}/" style="color:inherit;text-decoration:none">The Git Times</a></h1>
    <div class="masthead-meta">
      <span>Archive</span>
      <span>AI-Generated Newspaper for Builders</span>
    </div>
  </header>

  <section class="archive-list">
    <h2 class="section-header">All Editions</h2>

    <nav class="edition-nav">
      <a href="{{BASE_PATH}}/">Latest Edition</a>

    <p>The Git Times aims to provide information that inspires people to build.</p>
  </footer>

</html>
